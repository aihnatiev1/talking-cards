name: smartapp
description: Дитячі картки-розмовлялки — картки зі звуками та реченнями для дітей.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.0

dependencies:
  flutter:
    sdk: flutter
  flutter_card_swiper: ^7.0.0
  flutter_soloud: ^3.1.1
  audio_session: ^0.1.21
  shared_preferences: ^2.3.0
  flutter_riverpod: ^2.6.0
  path_provider: ^2.1.5
  in_app_review: ^2.0.10
  flutter_local_notifications: ^18.0.1
  timezone: ^0.10.0
  share_plus: ^10.1.4
  package_info_plus: ^8.0.0
  flutter_timezone: ^3.0.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  flutter_launcher_icons: ^0.14.3

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "png/іконка/іконка.png"
  adaptive_icon_background: "#2196F3"
  adaptive_icon_foreground: "png/іконка/іконка.png"
  remove_alpha_ios: true

flutter:
  uses-material-design: true
  assets:
    - assets/data/
    - assets/images/png/
    - assets/audio_wav/
